<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Estimado — Verdeo</title>
<style>
  :root {
    --green:#1f9d55; --green-dark:#157a40; --green-deep:#12331f;
    --ink:#17251c; --ink-soft:#5c6b62; --line:#e7ebe8; --panel:#f6f8f7;
    --red:#b91c1c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#eef1ee; color:var(--ink); min-height:100vh;
    padding:18px 12px 40px; display:flex; justify-content:center;
  }
  .sheet {
    width:100%; max-width:640px; background:#fff; border-radius:14px;
    box-shadow:0 12px 34px rgba(23,37,28,.10); padding:34px 26px 26px; height:fit-content;
  }
  /* Letterhead */
  .head { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; }
  .brand { display:flex; align-items:center; gap:10px; }
  .leaf { font-size:26px; }
  .brand-name { font-size:21px; font-weight:800; letter-spacing:.5px; color:var(--green-deep); text-transform:uppercase; line-height:1.15; }
  .contact { text-align:right; font-size:13px; color:var(--ink-soft); line-height:1.6; }
  .contact b { color:var(--ink); font-size:13.5px; }
  hr { border:none; border-top:1px solid var(--line); margin:22px 0; }
  /* Title + meta */
  h1 { font-size:26px; font-weight:800; letter-spacing:5px; color:var(--green-deep); }
  .meta { display:flex; gap:28px; margin-top:14px; flex-wrap:wrap; }
  .meta .k { font-size:11px; font-weight:700; letter-spacing:1.2px; color:var(--ink-soft); text-transform:uppercase; }
  .meta .v { font-size:15px; margin-top:3px; }
  /* Prepared for */
  .prepared { background:var(--panel); border-radius:12px; padding:16px 18px; margin-top:22px; }
  .prepared .k { font-size:11px; font-weight:700; letter-spacing:1.2px; color:var(--ink-soft); text-transform:uppercase; }
  .prepared .name { font-size:17px; font-weight:700; margin-top:6px; }
  .prepared .row { font-size:14.5px; margin-top:4px; color:var(--ink); }
  /* Items */
  table { width:100%; border-collapse:collapse; margin-top:24px; }
  th { font-size:11px; font-weight:700; letter-spacing:1.2px; color:var(--ink-soft); text-transform:uppercase; text-align:left; padding-bottom:8px; border-bottom:1px solid var(--line); }
  th.p { text-align:right; }
  td { padding:12px 0; border-bottom:1px solid var(--line); font-size:15px; }
  td .qty { color:var(--ink-soft); font-size:13px; }
  td.amt { text-align:right; font-weight:700; white-space:nowrap; }
  .totalrow { display:flex; justify-content:flex-end; margin-top:16px; }
  .totalbox { min-width:230px; border-top:2px solid var(--ink); padding-top:12px; display:flex; justify-content:space-between; align-items:baseline; gap:18px; }
  .totalbox b { font-size:15px; letter-spacing:.5px; text-transform:uppercase; }
  .totalbox .n { font-size:26px; font-weight:800; color:var(--green-dark); }
  /* Notes + photo */
  .notes-k { font-size:11px; font-weight:700; letter-spacing:1.2px; color:var(--ink-soft); text-transform:uppercase; margin-top:26px; }
  .notes { font-size:14.5px; color:var(--ink); line-height:1.5; margin-top:6px; }
  .photo { width:100%; border-radius:12px; margin-top:12px; }
  /* CTA / signature */
  .cta { background:var(--green-deep); border-radius:14px; padding:20px 18px; margin-top:28px; }
  .cta h2 { color:#fff; font-size:17px; text-align:center; }
  .cta p { color:#c9e5d4; font-size:13.5px; text-align:center; margin-top:4px; }
  canvas { width:100%; height:150px; background:#fff; border-radius:10px; touch-action:none; margin-top:14px; }
  .clear { background:none; border:none; color:#c9e5d4; font-size:13px; padding:6px 0; cursor:pointer; text-decoration:underline; font-family:inherit; }
  .btn {
    width:100%; border:none; border-radius:999px; padding:15px;
    font-size:16px; font-weight:700; cursor:pointer; margin-top:10px;
    background:var(--green); color:#fff; font-family:inherit;
  }
  .btn:disabled { opacity:.45; }
  .reject { display:block; text-align:center; margin-top:12px; color:#c9e5d4; font-size:13.5px; background:none; border:none; width:100%; cursor:pointer; text-decoration:underline; font-family:inherit; }
  .banner { border-radius:14px; padding:20px; text-align:center; margin-top:28px; font-weight:700; font-size:15px; }
  .banner.ok { background:var(--green-deep); color:#fff; }
  .banner.no { background:var(--panel); color:var(--ink-soft); }
  /* Fine print + footer */
  .fine { font-size:12.5px; color:var(--ink-soft); text-align:center; margin-top:16px; line-height:1.5; }
  .foot { text-align:center; margin-top:18px; padding-top:14px; border-top:1px solid var(--line); font-size:12.5px; color:var(--ink-soft); }
  .center { text-align:center; padding:40px 10px; color:var(--ink-soft); }
</style>
</head>
<body>
<div class="sheet" id="app"><div class="center">…</div></div>
<script>
const SUPABASE_URL = 'https://bpfuqfaykfloeagpiywd.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwZnVxZmF5a2Zsb2VhZ3BpeXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDI2ODIsImV4cCI6MjA5ODkxODY4Mn0.9o90PJseYPfd8lTPdvtQUlEvkPfVK1qqGXOgbo5xAUc';

const ES = navigator.language.toLowerCase().startsWith('es');
const T = ES ? {
  estimate:'ESTIMADO', numLabel:'Estimado #', dateLabel:'Fecha', validLabel:'Válido hasta',
  preparedFor:'Preparado para', workDesc:'Descripción del trabajo', price:'Precio',
  total:'Total estimado', notes:'Notas', notFound:'Este estimado no está disponible.',
  ready:'¿Listo para empezar? 🌿', signHint:'Firme abajo para aceptar este estimado',
  clear:'Limpiar firma', accept:'Aceptar estimado', reject:'No, gracias',
  accepted:'✓ Estimado aceptado. ¡Gracias! Nos pondremos en contacto pronto.',
  rejected:'Estimado rechazado. Gracias por su tiempo.',
  fine:'Este estimado es válido por 30 días. Los precios pueden variar si las condiciones del sitio difieren de lo descrito.',
  speak:'We speak English', confirmReject:'¿Seguro que desea rechazar este estimado?',
  error:'Ocurrió un error. Intente de nuevo.',
} : {
  estimate:'ESTIMATE', numLabel:'Estimate #', dateLabel:'Date', validLabel:'Valid until',
  preparedFor:'Prepared for', workDesc:'Description of work', price:'Price',
  total:'Estimated total', notes:'Notes', notFound:'This estimate is not available.',
  ready:'Ready to get started? 🌿', signHint:'Sign below to accept this estimate',
  clear:'Clear signature', accept:'Accept estimate', reject:'No, thank you',
  accepted:'✓ Estimate accepted. Thank you! We will be in touch soon.',
  rejected:'Estimate declined. Thanks for your time.',
  fine:'This estimate is valid for 30 days. Prices may vary if site conditions differ from what was described.',
  speak:'Se habla español', confirmReject:'Are you sure you want to decline this estimate?',
  error:'Something went wrong. Please try again.',
};

const token = new URLSearchParams(location.search).get('t');
const app = document.getElementById('app');
let hasInk = false;

async function rpc(fn, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: { apikey: ANON_KEY, Authorization: `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(await r.text());
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money = (n) => '$' + Number(n).toLocaleString();
const locale = ES ? 'es-US' : 'en-US';

function fmtDate(d) {
  return d.toLocaleDateString(locale, { month:'2-digit', day:'2-digit', year:'numeric' });
}
function parseIso(iso) { const [y,m,d] = iso.split('-').map(Number); return new Date(y, m-1, d); }

function render(e) {
  const items = (e.items || []).filter((i) => i.desc);
  const rows = items.map((i) =>
    `<tr><td>${esc(i.desc)} ${i.qty > 1 ? `<span class="qty">(${i.qty} × ${money(i.price)})</span>` : ''}</td><td class="amt">${money(i.qty * i.price)}</td></tr>`
  ).join('');

  const issued = parseIso(e.date);
  const valid = new Date(issued); valid.setDate(valid.getDate() + 30);
  const num = e.number ? String(e.number).padStart(4, '0') : '—';

  let action = '';
  if (e.status === 'pendiente') {
    action = `
      <div class="cta">
        <h2>${T.ready}</h2>
        <p>✍️ ${T.signHint}</p>
        <canvas id="pad"></canvas>
        <button class="clear" id="clear">${T.clear}</button>
        <button class="btn" id="accept" disabled>${T.accept}</button>
        <button class="reject" id="reject">${T.reject}</button>
      </div>`;
  } else if (e.status === 'aceptado') {
    action = `<div class="banner ok">${T.accepted}</div>`;
  } else {
    action = `<div class="banner no">${T.rejected}</div>`;
  }

  app.innerHTML = `
    <div class="head">
      <div class="brand"><span class="leaf">🌱</span><div class="brand-name">${esc(e.business)}</div></div>
      <div class="contact"><b>${esc(e.business)}</b><br>${esc(e.business_phone)}</div>
    </div>
    <hr>
    <h1>${T.estimate}</h1>
    <div class="meta">
      <div><div class="k">${T.numLabel}</div><div class="v">${num}</div></div>
      <div><div class="k">${T.dateLabel}</div><div class="v">${fmtDate(issued)}</div></div>
      <div><div class="k">${T.validLabel}</div><div class="v">${fmtDate(valid)}</div></div>
    </div>
    <div class="prepared">
      <div class="k">${T.preparedFor}</div>
      <div class="name">${esc(e.customer)}</div>
      ${e.customer_phone ? `<div class="row">${esc(e.customer_phone)}</div>` : ''}
      ${e.addr ? `<div class="row">${esc(e.addr)}</div>` : ''}
    </div>
    ${rows ? `<table><tr><th>${T.workDesc}</th><th class="p">${T.price}</th></tr>${rows}</table>` : ''}
    <div class="totalrow"><div class="totalbox"><b>${T.total}</b><span class="n">${money(e.amount)}</span></div></div>
    ${e.description ? `<div class="notes-k">${T.notes}</div><div class="notes">${esc(e.description)}</div>` : ''}
    ${e.photo_url ? `<img class="photo" src="${esc(e.photo_url)}" alt="">` : ''}
    ${action}
    <div class="fine">${T.fine}</div>
    <div class="foot">${esc(e.business)} · ${esc(e.business_phone)} · ${T.speak}</div>`;

  if (e.status === 'pendiente') wireActions();
}

function wireActions() {
  const pad = document.getElementById('pad');
  const ctx = pad.getContext('2d');
  const scale = window.devicePixelRatio || 1;
  pad.width = pad.offsetWidth * scale;
  pad.height = pad.offsetHeight * scale;
  ctx.scale(scale, scale);
  ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.strokeStyle = '#17251c';
  let drawing = false;

  const pos = (ev) => {
    const r = pad.getBoundingClientRect();
    return [ev.clientX - r.left, ev.clientY - r.top];
  };
  pad.addEventListener('pointerdown', (ev) => {
    drawing = true; hasInk = true;
    document.getElementById('accept').disabled = false;
    const [x, y] = pos(ev); ctx.beginPath(); ctx.moveTo(x, y);
    pad.setPointerCapture(ev.pointerId);
  });
  pad.addEventListener('pointermove', (ev) => {
    if (!drawing) return;
    const [x, y] = pos(ev); ctx.lineTo(x, y); ctx.stroke();
  });
  pad.addEventListener('pointerup', () => { drawing = false; });

  document.getElementById('clear').onclick = () => {
    ctx.clearRect(0, 0, pad.width, pad.height);
    hasInk = false;
    document.getElementById('accept').disabled = true;
  };

  document.getElementById('accept').onclick = async () => {
    if (!hasInk) return;
    document.getElementById('accept').disabled = true;
    try {
      await rpc('respond_estimate_public', { token, action: 'aceptado', sig: pad.toDataURL('image/png') });
      load();
    } catch { alert(T.error); document.getElementById('accept').disabled = false; }
  };
  document.getElementById('reject').onclick = async () => {
    if (!confirm(T.confirmReject)) return;
    try {
      await rpc('respond_estimate_public', { token, action: 'rechazado' });
      load();
    } catch { alert(T.error); }
  };
}

async function load() {
  if (!token) { app.innerHTML = `<div class="center">${T.notFound}</div>`; return; }
  try {
    const e = await rpc('get_estimate_public', { token });
    if (!e) { app.innerHTML = `<div class="center">${T.notFound}</div>`; return; }
    render(e);
  } catch { app.innerHTML = `<div class="center">${T.notFound}</div>`; }
}
load();
</script>
</body>
</html>
